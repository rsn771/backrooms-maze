<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Backrooms Maze</title>
<style>
  :root {
    --app-height: 100dvh;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: fixed;
    inset: 0;
    width: 100vw;
    min-height: 100vh;
    min-height: 100dvh;
    height: var(--app-height);
    overflow: hidden;
    font-family: monospace;
    touch-action: none;
    overscroll-behavior: none;
  }
  #gameContainer {
    position: relative;
    width: 100vw;
    height: var(--app-height);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }
  #canvas {
    display: block;
    image-rendering: pixelated;
  }
  #hud {
    position: absolute;
    top: calc(var(--safe-top) + 8px);
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 calc(var(--safe-right) + 12px) 0 calc(var(--safe-left) + 12px);
    color: #c8b96a;
    font-size: 13px;
    text-shadow: 0 0 6px #c8b96a;
    pointer-events: none;
    z-index: 10;
  }
  #joystickArea {
    position: absolute;
    bottom: calc(var(--safe-bottom) + 30px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    touch-action: none;
    user-select: none;
  }
  #joystickBase {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(200, 185, 106, 0.12);
    border: 2px solid rgba(200, 185, 106, 0.4);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #joystickKnob {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, rgba(200,185,106,0.9), rgba(140,120,40,0.7));
    border: 2px solid rgba(200, 185, 106, 0.8);
    position: absolute;
    cursor: pointer;
    transition: none;
    box-shadow: 0 0 12px rgba(200,185,106,0.4);
  }
  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #c8b96a;
    font-size: 22px;
    text-align: center;
    text-shadow: 0 0 20px #c8b96a;
    pointer-events: none;
    z-index: 30;
    display: none;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="canvas"></canvas>
  <div id="hud">
    <span id="hudLevel">LEVEL 0</span>
    <span id="hudPos"></span>
    <span id="hudTime">00:00</span>
  </div>
  <div id="joystickArea">
    <div id="joystickBase">
      <div id="joystickKnob"></div>
    </div>
  </div>
  <div id="message"></div>
</div>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="game.js"></script>
</body>
</html>
