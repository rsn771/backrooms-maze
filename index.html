<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Backrooms Maze</title>
<style>
  :root {
    --app-height: 100dvh;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: fixed;
    inset: 0;
    width: 100vw;
    min-height: 100vh;
    min-height: 100dvh;
    height: var(--app-height);
    overflow: hidden;
    font-family: monospace;
    touch-action: none;
    overscroll-behavior: none;
  }
  #gameContainer {
    position: relative;
    width: 100vw;
    height: var(--app-height);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }
  #canvas {
    display: block;
    image-rendering: pixelated;
  }
  #hud {
    position: absolute;
    top: calc(var(--safe-top) + 8px);
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 calc(var(--safe-right) + 12px) 0 calc(var(--safe-left) + 12px);
    color: #c8b96a;
    font-size: 13px;
    text-shadow: 0 0 6px #c8b96a;
    pointer-events: none;
    z-index: 10;
  }
  #joystickArea {
    position: absolute;
    bottom: calc(var(--safe-bottom) + 30px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    touch-action: none;
    user-select: none;
  }
  #joystickBase {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(200, 185, 106, 0.12);
    border: 2px solid rgba(200, 185, 106, 0.4);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #joystickKnob {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, rgba(200,185,106,0.9), rgba(140,120,40,0.7));
    border: 2px solid rgba(200, 185, 106, 0.8);
    position: absolute;
    cursor: pointer;
    transition: none;
    box-shadow: 0 0 12px rgba(200,185,106,0.4);
  }
  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #c8b96a;
    font-size: 22px;
    text-align: center;
    text-shadow: 0 0 20px #c8b96a;
    pointer-events: none;
    z-index: 30;
    display: none;
    line-height: 1.6;
  }
  #lobbyOverlay {
    position: absolute;
    inset: 0;
    z-index: 40;
    display: grid;
    place-items: center;
    padding: 20px;
    background:
      radial-gradient(circle at top, rgba(200, 185, 106, 0.14), transparent 38%),
      linear-gradient(180deg, rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.88));
  }
  #lobbyOverlay.hidden,
  #roomShareBox.hidden {
    display: none;
  }
  .lobbyCard {
    width: min(92vw, 420px);
    border: 1px solid rgba(200, 185, 106, 0.28);
    background: rgba(10, 10, 8, 0.92);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.46);
    border-radius: 24px;
    padding: 18px;
    color: #efe6b2;
    display: grid;
    gap: 12px;
  }
  .lobbyTitle {
    font-size: 24px;
    font-weight: 700;
    color: #fff2a7;
    text-shadow: 0 0 12px rgba(255, 242, 167, 0.28);
  }
  .lobbyText, #lobbyStatus {
    color: rgba(239, 230, 178, 0.82);
    font-size: 14px;
    line-height: 1.5;
  }
  .lobbyActions, .joinRow, #roomShareBox {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .joinRow {
    grid-template-columns: 1fr auto;
  }
  .lobbyBtn, #roomCodeInput {
    appearance: none;
    border: 1px solid rgba(200, 185, 106, 0.34);
    background: rgba(27, 25, 16, 0.94);
    color: #fff1b5;
    border-radius: 16px;
    min-height: 48px;
    padding: 0 14px;
    font: inherit;
  }
  .lobbyBtn {
    cursor: pointer;
    font-weight: 700;
  }
  .lobbyBtn.primary {
    background: linear-gradient(180deg, rgba(215, 197, 120, 0.96), rgba(155, 128, 42, 0.92));
    color: #161106;
    border-color: rgba(255, 231, 145, 0.62);
  }
  .lobbyBtn.secondary {
    background: rgba(24, 23, 17, 0.92);
  }
  #roomCodeInput {
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  #roomCodeDisplay {
    border: 1px dashed rgba(200, 185, 106, 0.34);
    border-radius: 16px;
    padding: 14px;
    text-align: center;
    font-size: 18px;
    letter-spacing: 0.18em;
    color: #fff1b5;
    background: rgba(19, 18, 12, 0.9);
  }
  #playerRoster {
    display: grid;
    gap: 6px;
    color: rgba(239, 230, 178, 0.72);
    font-size: 13px;
    min-height: 18px;
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="canvas"></canvas>
  <div id="hud">
    <span id="hudLevel">LEVEL 0</span>
    <span id="hudPos"></span>
    <span id="hudTime">00:00</span>
  </div>
  <div id="joystickArea">
    <div id="joystickBase">
      <div id="joystickKnob"></div>
    </div>
  </div>
  <div id="message"></div>
  <div id="lobbyOverlay">
    <div class="lobbyCard">
      <div class="lobbyTitle">Backrooms Maze</div>
      <div class="lobbyText">Co-op mode for up to 4 players. Create a room, share the code or link, and survive the maze together.</div>
      <div id="lobbyStatus">Connecting co-op services…</div>
      <div class="lobbyActions">
        <button id="createRoomBtn" class="lobbyBtn primary" type="button">Create Room</button>
        <button id="soloBtn" class="lobbyBtn secondary" type="button">Solo</button>
      </div>
      <div class="joinRow">
        <input id="roomCodeInput" type="text" placeholder="ROOM CODE" maxlength="8" autocomplete="off" />
        <button id="joinRoomBtn" class="lobbyBtn secondary" type="button">Join</button>
      </div>
      <div id="roomShareBox" class="hidden">
        <div id="roomCodeDisplay">------</div>
        <button id="copyRoomLinkBtn" class="lobbyBtn secondary" type="button">Copy Link</button>
      </div>
      <div id="playerRoster"></div>
    </div>
  </div>
</div>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script type="module" src="game.js"></script>
</body>
</html>
